<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{ app_name if app_name else "Secrets Rotation Automator" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}?v=10" rel="stylesheet">

    <style>
        .badge-critical { background-color: #dc3545; color: white; padding: 0.35em 0.65em; border-radius: 50rem; font-weight: 700; font-size: 0.75em; }
        .badge-high { background-color: #fd7e14; color: white; padding: 0.35em 0.65em; border-radius: 50rem; font-weight: 700; font-size: 0.75em; }
        .badge-medium { background-color: #ffc107; color: black; padding: 0.35em 0.65em; border-radius: 50rem; font-weight: 700; font-size: 0.75em; }
        .badge-low { background-color: #198754; color: white; padding: 0.35em 0.65em; border-radius: 50rem; font-weight: 700; font-size: 0.75em; }
        
        .badge-critical { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🔐 SecretShield</a>
            <div>
                <a class="btn btn-sm me-2 {{ 'btn-light' if request.path == '/' else 'btn-outline-light' }}" href="/">Analyze</a>
                <a class="btn btn-sm me-2 {{ 'btn-light' if request.path == '/usages' else 'btn-outline-light' }}" href="/usages">Find Usages</a>
                <a class="btn btn-sm {{ 'btn-light' if request.path == '/scan-github' else 'btn-outline-light' }}" href="/scan-github">Scan GitHub</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
